name: xyz-tradfi-archiver

services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${ARCHIVE_S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${ARCHIVE_S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  bucket-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      ARCHIVE_BUCKET: ${ARCHIVE_BUCKET:-xyz-tradfi-archive}
      ARCHIVE_S3_ACCESS_KEY: ${ARCHIVE_S3_ACCESS_KEY:-minioadmin}
      ARCHIVE_S3_SECRET_KEY: ${ARCHIVE_S3_SECRET_KEY:-minioadmin}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$ARCHIVE_S3_ACCESS_KEY $$ARCHIVE_S3_SECRET_KEY &&
      mc mb --ignore-existing local/$$ARCHIVE_BUCKET &&
      mc version enable local/$$ARCHIVE_BUCKET || true
      "

  recorder:
    build: .
    command: ["record"]
    restart: unless-stopped
    depends_on:
      bucket-init:
        condition: service_completed_successfully
    env_file: .env
    volumes:
      - archiver-state:/var/lib/xyz-tradfi-archiver

  writer:
    build: .
    command: ["write"]
    restart: unless-stopped
    depends_on:
      bucket-init:
        condition: service_completed_successfully
    env_file: .env
    volumes:
      - archiver-state:/var/lib/xyz-tradfi-archiver

  validator:
    build: .
    command: ["validate-loop"]
    restart: unless-stopped
    depends_on:
      bucket-init:
        condition: service_completed_successfully
    env_file: .env
    volumes:
      - archiver-state:/var/lib/xyz-tradfi-archiver

volumes:
  minio-data:
  archiver-state:
