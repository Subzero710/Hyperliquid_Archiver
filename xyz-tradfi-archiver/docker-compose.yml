name: xyz-tradfi-archiver

services:
  recorder:
    build:
      context: .
      network: host
    command: ["record"]
    restart: unless-stopped
    network_mode: host
    env_file: .env
    volumes:
      - archiver-state:/var/lib/xyz-tradfi-archiver
    logging:
      driver: local
      options:
        max-size: "50m"
        max-file: "5"

  writer:
    build:
      context: .
      network: host
    command: ["write"]
    restart: unless-stopped
    network_mode: host
    env_file: .env
    volumes:
      - archiver-state:/var/lib/xyz-tradfi-archiver
    logging:
      driver: local
      options:
        max-size: "50m"
        max-file: "5"

  validator:
    build:
      context: .
      network: host
    command: ["validate-loop"]
    restart: unless-stopped
    network_mode: host
    env_file: .env
    volumes:
      - archiver-state:/var/lib/xyz-tradfi-archiver
    healthcheck:
      test: ["CMD", "python", "-m", "app.cli", "validate-once"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 15m
    logging:
      driver: local
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  archiver-state: